<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1520px;
    background: #060606;
    display: flex;
    gap: 10px;
    padding: 10px;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  .logo-box {
    width: 500px;
    height: 500px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ══════════════════════════════════════════
     STYLE 1 — Minimal flat wordmark
     Clean, modern, no gimmicks
  ══════════════════════════════════════════ */

  .s1 { background: #0f0f0f; }

  .s1-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Big stacked letters */
  .s1-penny {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -5px;
    color: #ffffff;
    line-height: 0.9;
    text-transform: lowercase;
  }

  .s1-bid {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -5px;
    color: #ff6200;
    line-height: 0.9;
    text-transform: lowercase;
  }

  .s1-bar {
    width: 260px;
    height: 4px;
    background: linear-gradient(to right, #ff6200, rgba(255,98,0,0));
    margin-top: 24px;
    border-radius: 2px;
  }

  .s1-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff6200;
    position: absolute;
    left: 0;
    top: -3px;
    box-shadow: 0 0 12px rgba(255,98,0,0.9);
  }

  .s1-sub {
    margin-top: 16px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #333;
  }

  .s1-glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,98,0,0.07) 0%, transparent 70%);
  }


  /* ══════════════════════════════════════════
     STYLE 2 — Hexagon badge
     Bold, geometric, authoritative
  ══════════════════════════════════════════ */

  .s2 { background: #0a0a0a; }

  .s2-hex {
    position: relative;
    width: 300px;
    height: 345px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .s2-hex svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .s2-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .s2-icon {
    font-size: 52px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(255,98,0,0.6));
  }

  .s2-penny {
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .s2-bid {
    font-size: 42px;
    font-weight: 900;
    color: #ff6200;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .s2-divider {
    width: 60px;
    height: 2px;
    background: rgba(255,98,0,0.4);
    margin: 10px 0;
    border-radius: 1px;
  }

  .s2-tagline {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
  }


  /* ══════════════════════════════════════════
     STYLE 3 — Abstract mark: P + penny slot
     Icon-first, app-icon ready
  ══════════════════════════════════════════ */

  .s3 { background: #0f0f0f; }

  .s3-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* The mark: stylized P with a coin slot cut through it */
  .s3-mark {
    position: relative;
    width: 180px;
    height: 180px;
  }

  .s3-mark svg {
    width: 180px;
    height: 180px;
  }

  .s3-wordmark {
    display: flex;
    align-items: baseline;
    gap: 2px;
  }

  .s3-w-penny {
    font-size: 44px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -2px;
    line-height: 1;
  }

  .s3-w-bid {
    font-size: 44px;
    font-weight: 900;
    color: #ff6200;
    letter-spacing: -2px;
    line-height: 1;
  }

  .s3-sol {
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.35;
  }
  .s3-sol span {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    font-weight: 600;
  }

</style>
</head>
<body>

  <!-- ── STYLE 1: Minimal stacked wordmark ── -->
  <div class="logo-box s1">
    <div class="s1-glow"></div>
    <div class="s1-inner">
      <div class="s1-penny">penny</div>
      <div class="s1-bid">Bid</div>
      <div style="position:relative;width:260px;">
        <div class="s1-bar"></div>
        <div class="s1-dot"></div>
      </div>
      <div class="s1-sub">Penny auctions · Solana</div>
    </div>
  </div>

  <!-- ── STYLE 2: Hexagon badge ── -->
  <div class="logo-box s2">
    <div class="s2-hex">
      <svg viewBox="0 0 300 345" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer hex fill -->
        <polygon
          points="150,6 294,82.5 294,262.5 150,339 6,262.5 6,82.5"
          fill="#141414"
          stroke="#ff6200"
          stroke-width="2.5"
          stroke-opacity="0.5"
        />
        <!-- Inner hex outline -->
        <polygon
          points="150,26 274,93 274,252 150,319 26,252 26,93"
          fill="none"
          stroke="rgba(255,98,0,0.12)"
          stroke-width="1"
        />
        <!-- Orange fill strip at bottom -->
        <polygon
          points="150,339 6,262.5 6,282 150,358 294,282 294,262.5"
          fill="#ff6200"
          opacity="0.18"
        />
        <!-- Glow center -->
        <radialGradient id="hg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff6200" stop-opacity="0.1"/>
          <stop offset="100%" stop-color="#ff6200" stop-opacity="0"/>
        </radialGradient>
        <polygon
          points="150,6 294,82.5 294,262.5 150,339 6,262.5 6,82.5"
          fill="url(#hg)"
        />
        <!-- Corner accent dots -->
        <circle cx="150" cy="6"   r="4" fill="#ff6200" opacity="0.8"/>
        <circle cx="294" cy="82.5" r="3" fill="#ff6200" opacity="0.5"/>
        <circle cx="294" cy="262.5" r="3" fill="#ff6200" opacity="0.5"/>
        <circle cx="150" cy="339" r="4" fill="#ff6200" opacity="0.8"/>
        <circle cx="6"  cy="262.5" r="3" fill="#ff6200" opacity="0.5"/>
        <circle cx="6"  cy="82.5" r="3" fill="#ff6200" opacity="0.5"/>
      </svg>

      <div class="s2-content">
        <div class="s2-icon">🪙</div>
        <div class="s2-divider"></div>
        <div style="display:flex;gap:0;align-items:baseline;">
          <span class="s2-penny">penny</span><span class="s2-bid">Bid</span>
        </div>
        <div class="s2-divider" style="margin-top:10px;"></div>
        <div class="s2-tagline">Penny auctions on Solana</div>
      </div>
    </div>
  </div>

  <!-- ── STYLE 3: Abstract P mark + wordmark ── -->
  <div class="logo-box s3">
    <div class="s3-inner">

      <!-- Abstract P mark -->
      <div class="s3-mark">
        <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ff7a20"/>
              <stop offset="100%" stop-color="#cc4400"/>
            </linearGradient>
            <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#cccccc"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff6200" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#ff6200" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- Background glow circle -->
          <circle cx="90" cy="90" r="88" fill="url(#bg3)"/>
          <circle cx="90" cy="90" r="88" fill="none" stroke="rgba(255,98,0,0.2)" stroke-width="1"/>
          <circle cx="90" cy="90" r="76" fill="none" stroke="rgba(255,98,0,0.08)" stroke-width="1"/>

          <!-- Outer coin ring -->
          <circle cx="90" cy="90" r="68" fill="#161616" stroke="url(#og)" stroke-width="3"/>

          <!-- Inner ring engraving -->
          <circle cx="90" cy="90" r="58" fill="none" stroke="rgba(255,98,0,0.2)" stroke-width="1"/>

          <!-- Bold P glyph -->
          <!-- Vertical stem -->
          <rect x="54" y="44" width="18" height="92" rx="4" fill="url(#wg)"/>
          <!-- Top bowl of P -->
          <path d="M72 44 L72 44 Q110 44 110 68 Q110 92 72 92 L72 92" fill="none" stroke="url(#wg)" stroke-width="18" stroke-linecap="round"/>

          <!-- Orange coin slot / penny line through the P bowl -->
          <rect x="62" y="64" width="44" height="8" rx="4" fill="url(#og)" filter="url(#glow)"/>

          <!-- Solana-style three lines bottom-right -->
          <line x1="70" y1="118" x2="122" y2="118" stroke="rgba(255,98,0,0.5)" stroke-width="3" stroke-linecap="round"/>
          <line x1="70" y1="126" x2="114" y2="126" stroke="rgba(255,98,0,0.3)" stroke-width="2" stroke-linecap="round"/>
          <line x1="70" y1="133" x2="106" y2="133" stroke="rgba(255,98,0,0.15)" stroke-width="2" stroke-linecap="round"/>

          <!-- Corner tick marks on outer ring -->
          <line x1="90"  y1="2"   x2="90"  y2="12"  stroke="rgba(255,98,0,0.6)" stroke-width="2"/>
          <line x1="90"  y1="168" x2="90"  y2="178" stroke="rgba(255,98,0,0.6)" stroke-width="2"/>
          <line x1="2"   y1="90"  x2="12"  y2="90"  stroke="rgba(255,98,0,0.6)" stroke-width="2"/>
          <line x1="168" y1="90"  x2="178" y2="90"  stroke="rgba(255,98,0,0.6)" stroke-width="2"/>
          <circle cx="90" cy="2"  r="2.5" fill="#ff6200"/>
          <circle cx="90" cy="178" r="2.5" fill="#ff6200"/>
          <circle cx="2" cy="90"  r="2.5" fill="#ff6200"/>
          <circle cx="178" cy="90" r="2.5" fill="#ff6200"/>
        </svg>
      </div>

      <!-- Wordmark -->
      <div class="s3-wordmark">
        <span class="s3-w-penny">penny</span><span class="s3-w-bid">Bid</span>
      </div>

      <!-- Solana badge -->
      <div class="s3-sol">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="sl" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#9945FF"/>
              <stop offset="100%" stop-color="#14F195"/>
            </linearGradient>
          </defs>
          <path d="M4 17h13.5l2.5-2.5H6.5L4 17zm0-5h13.5l2.5-2.5H6.5L4 12zm2.5-5H20l-2.5-2.5H4L6.5 7z" fill="url(#sl)"/>
        </svg>
        <span>Built on Solana</span>
      </div>

    </div>
  </div>

</body>
</html>
